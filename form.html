<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VisualTest — Contact</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav>
      <div class="container">
        <span class="logo">VisualTest</span>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="pricing.html">Pricing</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="form.html" class="active">Contact</a></li>
        </ul>
      </div>
    </nav>

    <main>
      <div class="container">
        <section class="hero" style="padding: 40px 0;">
          <h1>Get in touch</h1>
          <p>Tell us about your project and we&rsquo;ll get back within one business day.</p>
        </section>

        <form onsubmit="event.preventDefault();">
          <div class="field">
            <label for="name">Full name</label>
            <input id="name" type="text" placeholder="Jane Doe" />
          </div>

          <div class="field">
            <label for="email">Work email</label>
            <input id="email" type="email" placeholder="jane@company.com" />
          </div>

          <div class="field">
            <label for="company-size">Company size</label>
            <select id="company-size">
              <option>1–10 employees</option>
              <option>11–50 employees</option>
              <option>51–200 employees</option>
              <option>200+ employees</option>
            </select>
          </div>

          <div class="field">
            <label for="message">How can we help?</label>
            <textarea id="message" placeholder="Tell us a bit about your use case…"></textarea>
          </div>

          <div class="field checkbox-row">
            <input id="newsletter" type="checkbox" checked />
            <label for="newsletter">Send me product updates (no spam, unsubscribe anytime)</label>
          </div>

          <button class="btn" type="submit">Send message</button>
        </form>
      </div>
    </main>

    <footer>
      <div class="container">© 2026 VisualTest. All rights reserved.</div>
    </footer>
  </body>
</html>
